name: QRadar Rules Deploy Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests urllib3

      - name: Deploy rules to QRadar
        env:
          QRADAR_HOST: ${{ secrets.QRADAR_HOST }}
          QRADAR_SEC_TOKEN: ${{ secrets.QRADAR_SEC_TOKEN }}
          QRADAR_IP: ${{ secrets.QRADAR_IP }}
          QRADAR_API_KEY: ${{ secrets.QRADAR_API_KEY }}
          QRADAR_URL: ${{ secrets.QRADAR_URL }}
          SEC_TOKEN: ${{ secrets.SEC_TOKEN }}
        run: python scripts/deploy_rules.py
