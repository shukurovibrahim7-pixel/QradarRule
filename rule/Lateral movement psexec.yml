title: Lateral Movement via PsExec
id: lm001-sigma
status: production
description: >
  PsExec vasitəsilə lateral movement aşkar edir. Hücumçular şəbəkədə
  yayılmaq üçün PsExec-dən istifadə edir. PSEXESVC servisinin yaradılması
  bu fəaliyyətin əsas göstəricisidir.
author: Blue Team - MILLISEC
date: 2026-04-30
tags:
  - attack.lateral_movement
  - attack.t1021.002
logsource:
  product: windows
  service: system
detection:
  selection:
    EventID: 7045
    ServiceName|contains:
      - "PSEXESVC"
      - "psexec"
  condition: selection
fields:
  - ServiceName
  - SourceIp
  - User
falsepositives:
  - Sistem administratorlarının legitim PsExec istifadəsi
level: critical
