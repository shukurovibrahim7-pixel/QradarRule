name: QRadar Rule Deploy

# ─── Tetikleyici şərtlər ──────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
    paths:
      - "rules/**"          # Yalnız rule dəyişikliklərdə işə düşür
      - "deploy_rules.py"   # Skript dəyişdikdə də işə düşür

  pull_request:
    branches:
      - main
    paths:
      - "rules/**"

  workflow_dispatch:        # Manual tetikleme imkanı

# ─── İcazələr ─────────────────────────────────────────────────────────────────
permissions:
  contents: read

# ─── İşlər ────────────────────────────────────────────────────────────────────
jobs:
  validate:
    name: "Sigma Rule Yoxlaması"
    runs-on: ubuntu-latest

    steps:
      - name: Kodu yüklə
        uses: actions/checkout@v4

      - name: Python quraşdır
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Asılılıqları quraşdır
        run: |
          pip install --upgrade pip
          pip install pyyaml requests urllib3

      - name: Sigma fayllarını sintaksis yoxlaması
        run: |
          python3 - <<'EOF'
          import glob, yaml, sys, os

          errors = []
          files  = glob.glob("rules/**/*.yml", recursive=True)
          files += glob.glob("rules/**/*.yaml", recursive=True)

          if not files:
              print("XƏBƏRDARLIQ: Heç bir rule faylı tapılmadı!")
              sys.exit(0)

          print(f"Yoxlanılan fayllar: {len(files)}")

          required_keys = {"title", "description", "detection", "logsource"}

          for fpath in sorted(files):
              try:
                  with open(fpath) as fh:
                      rule = yaml.safe_load(fh)

                  missing = required_keys - set(rule.keys())
                  if missing:
                      errors.append(f"{fpath}: Çatışmayan sahələr: {missing}")
                      continue

                  detection = rule.get("detection", {})
                  if "condition" not in detection:
                      errors.append(f"{fpath}: 'condition' sahəsi yoxdur")

                  print(f"  ✓ {fpath}")

              except yaml.YAMLError as exc:
                  errors.append(f"{fpath}: YAML xətası — {exc}")
              except Exception as exc:
                  errors.append(f"{fpath}: Ümumi xəta — {exc}")

          if errors:
              print("\n[XƏTA] Aşağıdaki rule-larda problem var:")
              for e in errors:
                  print(f"  ✗ {e}")
              sys.exit(1)

          print(f"\nBütün {len(files)} rule faylı keçərlidir ✓")
          EOF

  deploy:
    name: "QRadar-a Deploy"
    runs-on: ubuntu-latest
    needs: validate                    # Yalnız yoxlama keçsə deploy olur
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'

    environment:
      name: production                 # GitHub Environment qoruması

    steps:
      - name: Kodu yüklə
        uses: actions/checkout@v4

      - name: Python quraşdır
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Asılılıqları quraşdır
        run: |
          pip install --upgrade pip
          pip install pyyaml requests urllib3

      - name: Rule-ları deploy et
        env:
          QRADAR_HOST:      ${{ secrets.QRADAR_HOST }}
          QRADAR_API_TOKEN: ${{ secrets.QRADAR_API_TOKEN }}
          RULES_DIR:        ./rules
        run: |
          python3 deploy_rules.py

      - name: Deploy logunu arxivləşdir
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deploy-log-${{ github.run_number }}
          path: deploy_rules.log
          retention-days: 30

  notify:
    name: "Bildiriş"
    runs-on: ubuntu-latest
    needs: [validate, deploy]
    if: always()

    steps:
      - name: Deploy nəticəsini yoxla
        run: |
          if [ "${{ needs.deploy.result }}" == "success" ]; then
            echo "✓ Deploy uğurla tamamlandı (run #${{ github.run_number }})"
          elif [ "${{ needs.deploy.result }}" == "failure" ]; then
            echo "✗ Deploy uğursuz oldu! Log faylını yoxlayın."
            exit 1
          else
            echo "ℹ Deploy işə düşmədi (branch/event filtresi)"
          fi
