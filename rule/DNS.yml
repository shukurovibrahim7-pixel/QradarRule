title: DNS Tunneling Detection
id: dns001-sigma
status: production
description: >
  DNS tunneling cəhdini aşkar edir. Uzun DNS sorğu adları və
  yüksək tezlikli DNS sorğuları data exfiltration üçün istifadə
  edilə bilər. C2 kommunikasiyası üçün də bu texnika geniş istifadə olunur.
author: Blue Team - MILLISEC
date: 2026-04-30
tags:
  - attack.exfiltration
  - attack.t1048.003
  - attack.command_and_control
  - attack.t1071.004
logsource:
  category: network
  service: dns
detection:
  selection:
    QueryName|contains:
      - ".onion"
      - "dyndns"
      - "no-ip"
    DestinationPort: 53
  long_query:
    QueryName|re: ".{50,}"    # 50 simvoldan uzun DNS sorğusu
  condition: selection or long_query
fields:
  - QueryName
  - SourceIp
  - DestinationIp
falsepositives:
  - CDN domain-ləri (uzun subdomain-lər)
  - Bəzi antivirus update URL-ləri
level: medium
