name: QRadar Rules Deploy Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests urllib3

      - name: Deploy rules to QRadar
        env:
          QRADAR_IP: ${{ secrets.QRADAR_IP }}
          SEC_TOKEN: ${{ secrets.SEC_TOKEN }}
        run: python scripts/deploy_rules.py